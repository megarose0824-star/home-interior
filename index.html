<!DOCTYPE html>
<html>
<head>
    <title>interior design</title>
    <style>
        *{
            margin:0;
            padding:0;
            font-family: sans-serif;
        }
        .banner{
            width:100%;
            height: 100vh;
            background-image:linear-gradient(rgba(83, 79, 79, 0.75),
            rgba(47, 133, 65, 0.75)),url(images/hme.jpeg);
             background-size: cover;
            background-position: center;
        }
        .navbar{
            width:95%;
            margin:auto;
            padding:35px 0;
            display:flex;
            align-items:center;
            justify-content: space-between;
        }
        .logo{
            color:rgb(212, 142, 55);
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;

        }
        .navbar ul li{
            list-style: none;
            display:inline-block;
            margin:0 20px;
            position: relative;
        }
        .navbar ul li a{
            text-decoration: none;
            color: #000000;
            font-size: 18px;
            text-transform: uppercase;
        }
        
      .navbar ul li::after{
            content: '';
            height: 3px;
            width: 0;
            background:#009688;
            position: absolute;
            left:0;
            bottom:-10px;
            transition:0.5s;
        }
        .navbar ul li:hover::after{
            width: 100%;
        }
        .content{
            width:100%;
            position: absolute;
            top:50%;
            transform:translateY(-50%);
            text-align: center;
            color:#fff;;
        
        }
        .content h1{
            font-size: 70px;
            margin-top: 80px;
        }
        .content p{
            margin: 20px auto;
            font-weight: 100;
            line-height: 25px;
        }
        button{
            width: 200px;
            padding: 15px 0;
            text-align: center;
            margin: 20px 10px;
            border-radius: 25px;
            font-weight: bold;
            border:2px solid #009688;
            background:transparent;
            color : #fff;;
            cursor:pointer;
            position: relative;
            overflow: hidden;
        }
        span{
            background:#009688;
            height: 100%;
            width:0;
            border-radius:25px;
            position: absolute;
            left:0;
            bottom: 0;
            z-index: -1;
            transition: 0.5s;

        }
        button:hover span{
            width: 100%;
        }
        buttton:hover{
            border: none;
        }

        
    </style>
</head>
<body>
<div class="banner">
    <div class="navbar">
        <div class="logo"> !Nterior</div>
     <ul>
        <li><a href="design.html">home</a></li>
        <li><a href="bedroom.html">bedroom</a></li>
        <li><a href="dining.html">dining</a></li>
        <li><a href="kitchen.html">kitchen</a></li>
        <li><a href="backyard.html">backyard</a></li>
        <li><a href="contact.html">contact</a></li>
     </ul>
    </div>
    <div class="content">
        <h1> DESIGN YOUR HOUSE</h1><br>
        <p>
        Subscribe Easy Tutorial youtube Channel to
        watch more videos,<br> press the bell icon to Get lastest updates.
        </p>
    </div>
    <div>
        <button type="button"><span></span>WATCH MORE</button>
        <button type="button"><span></span>SUBSCRIBE</button>
    </div>
</div>
</body>
</html>
